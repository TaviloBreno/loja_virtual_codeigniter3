server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;  # ← APONTANDO PARA PUBLIC
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Arquivos estáticos - servir diretamente
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # Configuração principal para PHP
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Processar arquivos PHP
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
    }

    # Negar acesso a arquivos ocultos
    location ~ /\.ht {
        deny all;
    }
}