version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:latest
    container_name: loja_virtual_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - db
    networks:
      - loja_virtual_network

  # PHP-FPM
  php:
    build: .
    container_name: loja_virtual_php
    volumes:
      - ./src:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - loja_virtual_network

  # MySQL Database (usando porta diferente para evitar conflito)
  db:
    image: mysql:5.7
    container_name: loja_virtual_db
    ports:
      - "3307:3306"  # Usando 3307 para não conflitar com seu MySQL local
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: loja_virtual_db
      MYSQL_USER: loja_user
      MYSQL_PASSWORD: loja123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - loja_virtual_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: loja_virtual_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 100M
    depends_on:
      - db
    networks:
      - loja_virtual_network

  # MailHog para testes de email (útil para loja virtual)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: loja_virtual_mailhog
    ports:
      - "8025:8025"  # Interface web
      - "1025:1025"  # SMTP
    networks:
      - loja_virtual_network

networks:
  loja_virtual_network:
    driver: bridge

volumes:
  db_data: